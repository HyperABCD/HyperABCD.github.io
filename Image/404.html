<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Error 404 - Page not found</title>
    <style>
      /* Style de la page */
      body {
        font-family: 'Open Sans', sans-serif;
        text-align: center;
        background-color: #f8f8f8;
        color: #333;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
      }
      /* Style du titre */

      h1 {
        font-size: 48px;
        color: #ff0000
      }
      /* Style du message */
      p {
        font-size: 18px;
        color: gray;
        margin: 50px;
      }
      a {
        font-size: 18px;
        color: gray;
        border: 2px solid #333;
        box-shadow: 0 0 8px rgba(0, 0, 0, 0.1);
        border-radius: 20px;
        padding: 10px;
      }

    </style>
  </head>
  <body>
    <h1>Error 404</h1>
    <p>The page you requested was not found on this server.</p>
    <a href="site.html">Go back to home page</a>
  </body>
</html>
